<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Freyja's 18 Birthday!</title>
    <meta name="description" content="Join us as we celebrate Freyja's 18th Birthday.">

    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="manifest" href="site.webmanifest">
    <meta name="theme-color" content="#aa8844">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://theeeeef.github.io/Almost-there/"> <meta property="og:title" content="Celestial Dawn | You're Invited">
    <meta property="og:description" content="Celebrate Freyja's 18th Birthday at the Grand Palmera Hotel. Click to view the invitation.">
    <meta property="og:image" content="https://theeeeef.github.io/Almost-there/og-image.png"> <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="splash-page">
        <h1 class="invited-header">You are invited</h1>

        <div class="envelope-wrapper">
            <div class="envelope-base">
                <img src="envelope-body.png.png" alt="Envelope Base">
            </div>
            <div class="envelope-flap">
                <img src="envelope-flap.png.png" alt="Envelope Flap">
            </div>
            <div class="open-text">OPEN INVITATION</div>
        </div>
    </div>

    <div id="main-invitation">
    <div class="invitation-container">
        <img src="1.png" class="invitation-image" alt="Invitation Page 1">
        <div class="image-overlay">
            <h2 class="occasion">XVIII</h2>
            <h1 class="name">Freyja May Manatad</h1>
        </div>
    </div>

    <div class="invitation-container letter-page">
    <img src="2.png" class="invitation-image" alt="Invitation Page 2">
    

<div class="bottom-countdown-wrapper">
<div class="date-section-container">
    <h2 class="save-the-date-label">SAVE THE DATE</h2>

    <div class="date-horizontal-row">
        <div class="date-side-col">
            <span class="side-text">4:00 PM</span>
        </div>

        <div class="vertical-line"></div>

        <div class="date-center-col">
            <span class="month-name-top">MAY</span>
            <span class="day-number">26</span>
        </div>

        <div class="vertical-line"></div>

        <div class="date-side-col">
            <span class="side-text">2026</span>
        </div>
    </div>
</div>
        <div id="countdown-boxed">
            <div class="time-box-styled">
                <span id="days">00</span>
                <p>DAYS</p>
            </div>
            <div class="time-box-styled">
                <span id="hours">00</span>
                <p>HOURS</p>
            </div>
            <div class="time-box-styled">
                <span id="minutes">00</span>
                <p>MINS</p>
            </div>
            <div class="time-box-styled">
                <span id="seconds">00</span>
                <p>SECS</p>
            </div>
        </div>
    </div>
</div>

<div class="invitation-container">
    <img src="3.png" class="invitation-image">
    
    <div class="page-3-content">
        <p class="venue-label"> VENUE: GRAND PALMERA HOTEL</p>
        <div class="map-wrapper">
        <a href="https://maps.app.goo.gl/ApsxSWhN6hVM4aRJ9" target="_blank" class="map-link">
        <img src="map-screenshot.png" alt="Click for Directions to Grand Palmera Hotel" class="static-map-img">
        <div class="map-overlay-text">CLICK FOR DIRECTIONS</div>
    </a>
</div>
    </div>
</div>

<div class="invitation-container">
    <img src="4.png" class="invitation-image" alt="Invitation Page 4">
</div>

<div class="invitation-container">
    <img src="5.png" class="invitation-image" alt="Invitation Page 5">
    
    <div class="page-5-content">
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSfn_F60lMd9yyXUjLe_NIBWxV6CQ4VpV55gHvbOPTgjXLE6-g/viewform?usp=sharing&ouid=116498674858030115599" 
           target="_blank" class="rsvp-button">
           CONFIRM ATTENDANCE
        </a>
    </div>
</div>

    <script src="script.js"></script>
</body>
</html>
